<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/base/reset.css">
    <link rel="stylesheet" href="/styles/base/style-default.css">
    <link rel="stylesheet" href="/styles/base/font.css">
    <link rel="stylesheet" href="/styles/base/palet-color.css">
    <link rel="stylesheet" href="/styles/animations/animation-loaded-elem.css">
    <link rel="stylesheet" href="/styles/components/navScroll.css">
    <link rel="stylesheet" href="/styles/components/header.css">
    <link rel="stylesheet" href="/styles/pages/profile.css">
    <link rel="stylesheet" href="/styles/components//ticket-view.css">
    <link rel="stylesheet" href="/src/components/MyWatchList/MyWatchList.css">
    <link rel="stylesheet" href="/styles/components/footer.css">
    <script src="../src/utils/helpers/icons.js"></script>
    <link rel="shortcut icon" href="/assets/images/logo/Vector.svg" type="svg">
    <title>Cinema Dashboard</title>
</head>

<body>
    <div id="scroll"></div>
    <div class="overlay"></div>

    <header id="header"></header>

    <div id="menu"></div>
    <div id="search"></div>

    <div class="dashboard container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar__profile">
                <img src="/assets/images/profile/user1.png" alt="User avatar" class="sidebar__avatar">
                <div class="sidebar__userinfo">
                    <span class="sidebar__name">کاربر</span>
                    <span class="sidebar__email"></span>
                </div>
            </div>

            <nav class="sidebar__nav">
                <ul class="sidebar__menu">
                    <li class="sidebar__item sidebar__item--active my-account">
                        <svg>
                            <use href="#icon-user-circle"></use>
                        </svg>
                        <a href=" #" class="sidebar__link">حساب من</a>
                    </li>
                    <li class="sidebar__item my-ticket">
                        <svg>
                            <use href="#icon-ticket"></use>
                        </svg>
                        <a href="#" class="sidebar__link">بلیط‌های من</a>
                    </li>
                    <li class="sidebar__item">
                        <svg>
                            <use href="#icon-wallet"></use>
                        </svg>
                        <a href="#" class="sidebar__link">کیف پول</a>
                    </li>
                    <li class="sidebar__item">
                        <svg>
                            <use href="#icon-card-payment"></use>
                        </svg>
                        <a href="#" class="sidebar__link">پرداخت‌ها</a>
                    </li>
                    <li class="sidebar__item my-watchlist">
                        <svg>
                            <use href="#icon-movie-play"></use>
                        </svg>
                        <a href="#" class="sidebar__link">لیست پخش</a>
                    </li>
                    <li class="sidebar__item">
                        <svg>
                            <use href="#icon-setting"></use>
                        </svg>
                        <a href="#" class="sidebar__link">تنظیمات</a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main">



        </main>
    </div>
    

    <div id="footer"></div>
    <script src="/src/pages/profile.js" type="module"></script>
    <script src="/src/app.js" type="module"></script>

</body>

</html>
