<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/base/reset.css">
    <link rel="stylesheet" href="../styles/base/palet-color.css">
    <link rel="stylesheet" href="../styles/base/font.css">
    <link rel="stylesheet" href="../styles/base/style-default.css">
    <link rel="stylesheet" href="../styles/components/header.css">
    <link rel="stylesheet" href="../styles/components/navScroll.css">
    <link rel="stylesheet" href="../styles/pages/movie-page.css">
    <link rel="stylesheet" href="../styles/components/footer.css">
    <link rel="shortcut icon" href="../assets/images/logo/Vector.svg" type="svg">
    <script src="../src/utils/helpers/icons.js"></script>
    <title>Ticketor | صفحه فیلم</title>
</head>

<body>
    <div id="scroll"></div>
    <div class="overlay"></div>


    <header id="header"></header>

    <div id="menu"></div>
    <div id="search"></div>

    <section class="hero__movie">
        <div class="hero__movie-wrapper container">
            <h2 class="hero__movie-title">F1 The Movie</h2>
            <div class="hero__movie-media">
                <div class="image-wrapper">
                    <img src="" alt="" class="hero__movie-image">
                </div>
                <div class="teaser-wrapper">
                    <video poster="" controls class="hero__movie-video"></video>
                </div>

            </div>
        </div>
    </section>

    <section class="movie-info container">

        <div class="movie-info__wrapper">

            <div class="summery">
                <h3 class="summery__title">خلاصه</h3>
                <p class="summery__text"></p>
            </div>
            <div class="director-writers">
                <div class="director">
                    <h3 class="director__title">کارگردان</h3>
                    <span class="director__name"></span>
                </div>
                <div class="writers">
                    <h3 class="writers__title">نویسنده</h3>
                    <span class="writers__name"></span>
                </div>
            </div>

        </div>
        <div class="getTicketBtn-addFavBtn">
            <a href="#" class="get-ticket">
                <svg>
                    <use href="#icon-ticket"></use>
                </svg>
                <span>رزرو بلیط</span>
            </a>
            <div class="add-favorites">
                <div class="circle"></div>
                <svg>
                    <use href="#icon-heart-active"></use>
                </svg>
                <span>علاقه‌مندی</span>
            </div>
        </div>
    </section>

    <section class="cast container">
        <div class="section-header">
            <h2 class="cast__title">بازیگران</h2>
            <a href="" class="cast__all">
                <span>همه</span>
                <svg>
                    <use href="#arrow-left"></use>
                </svg>
            </a>
        </div>
        <div class="actors">
        </div>
    </section>

    <section class="reviews container">
        <div class="section-header reviews__header">
            <h2 class="reviews__title">نظرات کاربران</h2>
            <a href="" class="reviews__all">
                <span>همه</span>
                <svg>
                    <use href="#arrow-left"></use>
                </svg>
            </a>
        </div>

        <div class="reviews__main">
            <div class="reviews__scores">
                <div class="reviews__scores-value"></div>
                <div class="reviews__scores-label">
                    <span class="reviews__scores-title">امتیاز</span>
                    <span class="reviews__scores-favorable">خوب</span>
                </div>
            </div>
            <div class="reviews__breakdown">
                <div class="reviews__breakdown-item">
                    <span class="reviews__breakdown-label">مثبت</span>
                    <div class="reviews__progress">
                        <div class="reviews__progress-positive"></div>
                    </div>
                </div>
                <div class="reviews__breakdown-item">
                    <span class="reviews__breakdown-label">میانگین</span>
                    <div class="reviews__progress">
                        <div class="reviews__progress-average"></div>
                    </div>
                </div>
                <div class="reviews__breakdown-item">
                    <span class="reviews__breakdown-label">منفی</span>
                    <div class="reviews__progress">
                        <div class="reviews__progress-negative"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="reviews-tabs container">
        <div class="reviews-tabs__header">
            <span class="name-tab active">همه نظرات</span>
            <span class="name-tab">نظرات مثبت</span>
            <span class="name-tab">میانگین نظرات</span>
            <span class="name-tab">نظرات منفی</span>
        </div>
        <div class="tabs">
            <div class="review__wrapper">

                <div class="reviews__show-more">
                    <div class="btn-show-more">
                        <svg class="icon-more-comment">
                            <use href="#icon-more-comment"></use>
                        </svg>
                        <div class="btn-show-more__text">
                            <span class="number-more">10</span>
                            <span>نظر دیگر</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="comment container">
        <h3 class="comment__title">ارسال نظر</h3>
        <div class="comment__input">
            <div class="user">
                <div class="user__profile">

                </div>
                <span class="username">amir</span>
            </div>
            <textarea name="comment" id="input-comment" placeholder="نظر خود را بنویسید..."></textarea>
            <button type="button" class="comment__btn--send">ارسال نظر</button>
        </div>
    </section>

    <footer id="footer"></footer>

    <script type="module" src="../src/pages/page-movie.js"></script>
</body>

</html>
