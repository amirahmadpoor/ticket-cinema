<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/base/reset.css">
    <link rel="stylesheet" href="/styles/base/palet-color.css">
    <link rel="stylesheet" href="/styles/base/font.css">
    <link rel="stylesheet" href="/styles/base/style-default.css">
    <link rel="stylesheet" href="/styles/components/header.css">
    <link rel="stylesheet" href="/styles/components/navScroll.css">
    <link rel="stylesheet" href="/styles/pages/all-movies.css">
    <link rel="stylesheet" href="/styles/components/movieCard.css">
    <link rel="stylesheet" href="/styles/components/footer.css">
    <link rel="shortcut icon" href="/assets/images/logo/Vector.svg" type="svg">
    <script src="/src/icons.js"></script>
    <title>همه فیلم ها</title>
</head>

<body>
    <div id="scroll"></div>

    <header id="header"></header>

    <div class="menu-mobile">
        <!--home-->
        <a href="../index.html" class="menu-mobile__link active">
            <svg class="icons-menu-mobile">
                <use href="#icon-home"></use>
            </svg>
            <span class="menu-mobile__text">
                خانه
            </span>
        </a>
        <!--movie-->
        <a href="#" target="_blank" class="menu-mobile__link">
            <svg class="icons-menu-mobile">
                <use href="#icon-movie"></use>
            </svg>
            <span class="menu-mobile__text">
                فیلم
            </span>
        </a>
        <!--cinema-->
        <a href="#" class="menu-mobile__link">
            <svg class="icons-menu-mobile">
                <use href="#icon-cinema"></use>
            </svg>
            <span class="menu-mobile__text">
                سینما
            </span>
        </a>
        <!--search-->
        <a href="#" class="menu-mobile__link icon-search-mobile">
            <svg class="icons-menu-mobile icon-search">
                <use href="#icon-search"></use>
            </svg>
            <span class="menu-mobile__text">
                جستجو
            </span>
        </a>
        <!--user-->
        <a href="#" class="menu-mobile__link">
            <svg class="icons-menu-mobile">
                <use href="#icon-user"></use>
            </svg>
            <span class="menu-mobile__text">
                حساب
            </span>
        </a>
    </div>
    <div class="search-mobile">
        <div class="search-mobile__header">
            <svg class="icon-close-search">
                <use href="#icon-close"></use>
            </svg>
        </div>
        <div class="search-mobile__input">
            <svg>
                <use href="#icon-search"></use>
            </svg>
            <input type="text" class="search-mobile__text-input" autofocus placeholder="جستجو">
        </div>
        <div class="search-mobile__result">
        </div>
    </div>

    <section class="all-movies container">
        <div class="now-in-cinema__boxes"></div>
    </section>

    <footer id="footer">
    </footer>

    <script type="module" src="/src/allMovies.js"></script>
</body>

</html>
