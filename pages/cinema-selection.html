<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/base/reset.css">
    <link rel="stylesheet" href="../styles/base/palet-color.css">
    <link rel="stylesheet" href="../styles/base/font.css">
    <link rel="stylesheet" href="../styles/base/style-default.css">
    <link rel="stylesheet" href="../styles/components/header.css">
    <link rel="stylesheet" href="../styles/components/navScroll.css">
    <link rel="stylesheet" href="../styles/pages/cinema-selection.css">
    <link rel="stylesheet" href="../styles/components/footer.css">
    <link rel="shortcut icon" href="../assets/images/logo/Vector.svg" type="svg">
    <script src="../src/utils/helpers/icons.js"></script>
    <title>رزرو بلیط | تیکتور</title>
</head>

<body>
    <div id="scroll"></div>
    <div class="overlay"></div>

    <header id="header"></header>

    <div id="menu"></div>
    <div id="search"></div>

    <section class="info-movie bg-poster-movie">
        <div class="info-movie__wrapper container">
            <div class="info-movie__poster">
                <img src="" alt="" class="image-poster">
            </div>
            <div class="info-movie__texts">
                <h2 class="info-movie__title"></h2>
                <div class="info-movie__time-score">
                    <span class="info-movie__time"></span>
                    <div class="info-movie__score">
                        <span class="info-movie__score-number"></span>
                        <svg>
                            <use href="#icon-star"></use>
                        </svg>
                    </div>
                </div>
                <div class="info-movie__desc">
                    <p class="info-movie__desc-text"></p>
                    <span class="info-movie__desc-btn-more">مشاهده بیشتر</span>
                </div>
                <a href="" class="btn-add-list">
                    <span>اضافه کردن به لیست </span>
                    <svg>
                        <use href="#icon-plus"></use>
                    </svg>
                </a>
            </div>
        </div>
    </section>

    <section class="filter container">
        <div class="filter__option">
            <svg>
                <use href="#icon-filter"></use>
            </svg>
            <span class="filter__text">فیتلر</span>
        </div>
    </section>

    <div class="filter-box">
        <div class="filter-box__header">
            <span class="filter-box__title">فیلتر</span>
            <svg class="btn-close">
                <use href="#icon-close"></use>
            </svg>
        </div>
        <div class="filter-box__body">
            <div class="filter-box__filtering filter-box__price">
                <span>قیمت</span>
                <div class="filter-price">
                    <span class="price-start">0</span>
                    <span class="price-end">0 ریال</span>
                </div>
                <input type="range" value="0" id="range-price" class="filter-box__filter-range">
            </div>
            <div class="filter-box__filtering">
                <div class="filter-title">
                    <span>شهر</span>
                    <svg>
                        <use href="#arrow-left2"></use>
                    </svg>
                </div>
                <div class="filter-box__filter">
                    <label class="filter-wrapper">
                        <span class="city">تهران</span>
                        <div class="checkbox">
                            <input type="checkbox">
                            <span class="check-style"></span>
                        </div>
                    </label>
                    <label class="filter-wrapper">
                        <span class="city">مشهد</span>
                        <div class="checkbox">
                            <input type="checkbox">
                            <span class="check-style"></span>
                        </div>
                    </label>
                    <label class="filter-wrapper">
                        <span class="city">تبریز</span>
                        <div class="checkbox">
                            <input type="checkbox">
                            <span class="check-style"></span>
                        </div>
                    </label>
                    <label class="filter-wrapper">
                        <span class="city">اصفهان</span>
                        <div class="checkbox">
                            <input type="checkbox">
                            <span class="check-style"></span>
                        </div>
                    </label>
                    <label class="filter-wrapper">
                        <span class="city">قم</span>
                        <div class="checkbox">
                            <input type="checkbox">
                            <span class="check-style"></span>
                        </div>
                    </label>
                    <label class="filter-wrapper">
                        <span class="city">کرج</span>
                        <div class="checkbox">
                            <input type="checkbox">
                            <span class="check-style"></span>
                        </div>
                    </label>
                </div>
            </div>
            <div class="filter-box__filtering">
                <div class="filter-title">
                    <span>امکانات</span>
                    <svg>
                        <use href="#arrow-left2"></use>
                    </svg>
                </div>
                <!-- <input type="text" class="filter-box__filter"> -->
            </div>
        </div>
        <div class="filter-box__footer">
            <div class="btn-apply filter-box__btns">فیلتر</div>
            <div class="btn-cancel filter-box__btns">حذف فیلترها</div>
        </div>
    </div>

    <section class="cinemas container">
    </section>

    <footer id="footer"></footer>

    <script type="module" src="../src/pages/select-cinema.js"></script>
    <script type="module" src="../src/app.js"></script>

</body>

</html>
